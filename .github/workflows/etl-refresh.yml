name: Scheduled ETL refresh

# Demonstrates a repeatable, scheduled pipeline ("stays consistent over time").
# Builds the full dataset in a CI-local Postgres, then exports the slim subset into
# the hosted Neon database. Runs monthly and on demand. All real work is gated on the
# NEON_DATABASE_URL secret, so the workflow is a no-op until Neon is configured.
on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: homescope
          POSTGRES_PASSWORD: homescope
          POSTGRES_DB: homescope
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U homescope"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://homescope:homescope@localhost:5432/homescope
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Note when Neon is not configured
        if: ${{ env.NEON_DATABASE_URL == '' }}
        run: echo "NEON_DATABASE_URL secret not set; skipping. Add it to enable scheduled refresh."

      - uses: pnpm/action-setup@v4
        if: ${{ env.NEON_DATABASE_URL != '' }}
      - uses: actions/setup-node@v4
        if: ${{ env.NEON_DATABASE_URL != '' }}
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        if: ${{ env.NEON_DATABASE_URL != '' }}
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: ${{ env.NEON_DATABASE_URL != '' }}
        run: |
          pnpm install --frozen-lockfile
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin
          pip install -e ./etl

      - name: Build full dataset in CI-local Postgres
        if: ${{ env.NEON_DATABASE_URL != '' }}
        run: |
          pnpm --filter @homescope/db db:migrate
          pnpm --filter @homescope/db db:seed-metrics
          python -m homescope_etl load-geometry
          python -m homescope_etl run

      - name: Apply schema to Neon and export the slim dataset
        if: ${{ env.NEON_DATABASE_URL != '' }}
        run: |
          DATABASE_URL="$NEON_DATABASE_URL" pnpm --filter @homescope/db db:migrate
          DATABASE_URL="$NEON_DATABASE_URL" pnpm --filter @homescope/db db:seed-metrics
          python -m homescope_etl export-neon --target "$NEON_DATABASE_URL"
